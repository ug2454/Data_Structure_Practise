name: NSE Portfolio Tracker

on:
  schedule:
    # Runs at 09:15 IST (03:45 UTC) every weekday (Mon–Fri)
    # GitHub Actions uses UTC. IST = UTC+5:30
    - cron: '45 3 * * 1-5'

  # Allows manual trigger from the GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  track:
    name: Run portfolio tracker during market hours
    runs-on: ubuntu-latest

    # GitHub Actions max is 360 minutes (6 hours).
    # Market hours: 09:15–15:30 IST = 6h 15m.
    # The tracker exits automatically at 15:30 IST.
    # This timeout is a safety net in case the script hangs.
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: portfolio_tracker/requirements.txt

      - name: Install dependencies
        run: pip install -r portfolio_tracker/requirements.txt

      - name: Run portfolio tracker
        working-directory: portfolio_tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py
